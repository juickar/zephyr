description: |
  STM32C5 Ethernet

  This binding file describes the device tree properties required to configure
  and use the Ethernet controller on STM32C5 microcontrollers.
  The `st,stm32c5-ethernet` compatible string can be used for both series,
  ensuring flexibility and ease of configuration.

compatible: "st,stm32c5-ethernet"

include: st,stm32-ethernet-common.yaml
